<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>習慣トラッカー</title>
    <meta
      name="description"
      content="月カレンダーで習慣の継続を可視化するトラッカー"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "習慣トラッカー",
        "description": "月カレンダーで習慣の継続を可視化するトラッカー",
        "applicationCategory": "LifestyleApplication",
        "inLanguage": "ja"
      }
    </script>

    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@latest/dist/browser.js"></script>
  </head>

  <body>
    <!-- ===== ヘッダー ===== -->
    <header role="banner">
      <h1>習慣トラッカー</h1>
      <div class="date-header">
        <time id="current-date" datetime="2026-05-04">2026年5月4日（月）</time>
        <div class="date-controls">
          <select id="year-select" aria-label="カレンダーの年を選択"></select
          ><label for="year-select">年</label>

          <select id="month-select" aria-label="カレンダーの月を選択"></select
          ><label for="month-select">月</label>

          <select id="day-select" aria-label="日付を選択"></select
          ><label for="day-select">日</label>
        </div>
      </div>
    </header>

    <main id="main-content" role="main">
      <!-- ========================================
      上部エリア: 月ナビ + 習慣の追加・管理
    ======================================== -->
      <div class="top-area">
        <!-- 登録済み習慣のリスト -->
        <section aria-labelledby="habits-heading">
          <h2 id="habits-heading">登録中の習慣</h2>

          <ul id="habits-list" role="list" aria-label="登録済み習慣の一覧">
            <li>
              <article aria-label="習慣: ランニング">
                <span aria-hidden="true">🏃</span>
                <span>ランニング</span>
                <button
                  type="button"
                  aria-label="「ランニング」を編集"
                  data-action="edit"
                >
                  編集
                </button>
                <button
                  type="button"
                  aria-label="「ランニング」を削除"
                  data-action="delete"
                >
                  削除
                </button>
              </article>
            </li>
            <li>
              <article aria-label="習慣: 読書">
                <span aria-hidden="true">📚</span>
                <span>読書</span>
                <button
                  type="button"
                  aria-label="「読書」を編集"
                  data-action="edit"
                >
                  編集
                </button>
                <button
                  type="button"
                  aria-label="「読書」を削除"
                  data-action="delete"
                >
                  削除
                </button>
              </article>
            </li>
            <li>
              <article aria-label="習慣: 水を飲む">
                <span aria-hidden="true">💧</span>
                <span>水を飲む</span>
                <button
                  type="button"
                  aria-label="「水を飲む」を編集"
                  data-action="edit"
                >
                  編集
                </button>
                <button
                  type="button"
                  aria-label="「水を飲む」を削除"
                  data-action="delete"
                >
                  削除
                </button>
              </article>
            </li>
          </ul>

          <button type="button" id="undo-delete-button" hidden>
            直前の削除を戻す
          </button>
          <p role="status" hidden>習慣がまだ登録されていません。</p>
        </section>
        <!-- 習慣の追加フォーム -->
        <section aria-labelledby="add-heading">
          <h2 id="add-heading">習慣を追加</h2>

          <form
            id="add-form"
            aria-label="新しい習慣を追加するフォーム"
            novalidate
          >
            <!--
            絵文字の選択:
            fieldset + legend でグループ化するのがセマンティックに正しい
            input[type="radio"] + label のペアで各絵文字を表す
            → CSSで radio を非表示にして label だけ見せるのが一般的なスタイリング方法
          -->

            <fieldset>
              <legend>記録</legend>

              <div class="emoji-picker-wrapper">
                <div class="emoji-picker-input">
                  <button
                    type="button"
                    id="emoji-toggle"
                    aria-label="絵文字を選択する"
                    aria-expanded="false"
                  >
                    😊
                  </button>
                  <input
                    type="text"
                    id="habit-name"
                    name="habit-name"
                    placeholder="例: ランニング、読書..."
                    maxlength="20"
                    autocomplete="off"
                    required
                  />
                  <button type="submit">追加</button>
                </div>
                <input
                  id="habit-emoji"
                  name="habit-emoji"
                  type="hidden"
                  value="😊"
                  required
                />

                <div id="picker" hidden></div>
              </div>
            </fieldset>
          </form>
        </section>
      </div>
      <!-- /.top-area -->

      <!-- ---  自作カレンダー --- -->
      <section aria-labelledby="calendar-heading">
        <h2 id="calendar-heading">2026年5月の習慣カレンダー</h2>

        <div class="calendar-container" aria-label="2026年5月の習慣カレンダー">
          <div class="calendar-weekdays" aria-hidden="true">
            <div>月</div>
            <div>火</div>
            <div>水</div>
            <div>木</div>
            <div>金</div>
            <div>土</div>
            <div>日</div>
          </div>
          <div id="calendar-grid" class="calendar-grid"></div>
        </div>
      </section>
      <!-- 達成率グラフ -->
      <section aria-labelledby="progress-heading">
        <h2 id="progress-heading">今月の達成率</h2>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <p class="progress-text" id="progress-text">0%</p>
        </div>
      </section>
    </main>

    <footer role="contentinfo">
      <p>データはこのブラウザのみに保存されます</p>
    </footer>

    <!-- スクリーンリーダー専用スタイル -->
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <script src="js/script.js" defer></script>
  </body>
</html>
